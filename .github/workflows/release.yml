name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  APP_NAME: douyin_downloader
  PYTHON_VERSION: "3.10"

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x64
            asset_suffix: linux-x64
            archive_ext: tar.gz
          - runner: windows-latest
            label: windows-x64
            asset_suffix: windows-x64
            archive_ext: zip
          - runner: macos-14
            label: macos-arm64
            asset_suffix: macos-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Prepare CI requirements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          output = []
          for raw in Path("requirements.txt").read_text(encoding="utf-8").splitlines():
              line = raw.split("#", 1)[0].strip()
              if not line:
                  continue
              if line.startswith("asyncio") or line.startswith("dataclasses"):
                  continue
              output.append(line)

          Path("requirements-ci.txt").write_text("\n".join(output) + "\n", encoding="utf-8")
          print("Prepared requirements-ci.txt with", len(output), "entries")
          PY

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-ci.txt pyinstaller

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          # 刷新环境变量
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "NSIS installed, makensis path:"
          Get-Command makensis -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source

      - name: Build app
        shell: bash
        run: pyinstaller build.spec --clean --noconfirm

      - name: Prepare macOS distribution
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          arch="${{ matrix.asset_suffix == 'macos-arm64' && 'arm64' || 'intel' }}"
          APP_NAME="DY Video Downloader.app"

          # 检查 .app 是否创建成功
          if [ ! -d "dist/$APP_NAME" ]; then
            echo "Error: $APP_NAME not found in dist/"
            ls -la dist/
            exit 1
          fi

          # 1. 便携版：zip 压缩 .app（包含所有依赖文件，解压即用）
          portable_name="DY-Video-Downloader-${TAG_NAME}-macos-${arch}-portable"
          cd dist && zip -r "../${portable_name}.zip" "$APP_NAME" && cd ..
          echo "Created portable: ${portable_name}.zip"
          ls -lh "${portable_name}.zip"

          # 2. DMG 安装包
          dmg_name="DY-Video-Downloader-${TAG_NAME}-macos-${arch}"
          dmg_temp="dmg_temp"
          mkdir -p "$dmg_temp"
          cp -r "dist/$APP_NAME" "$dmg_temp/"
          ln -s /Applications "$dmg_temp/Applications"
          hdiutil create -volname "DY Video Downloader" -srcfolder "$dmg_temp" -ov -format UDZO "${dmg_name}.dmg"
          rm -rf "$dmg_temp"
          echo "Created DMG: ${dmg_name}.dmg"
          ls -lh "${dmg_name}.dmg"

      - name: Package build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          asset_name="DY-Video-Downloader-${TAG_NAME}-linux-x64"
          tar -C dist -czf "${asset_name}.tar.gz" "douyin_downloader"
          echo "ASSET_FILE=${asset_name}.tar.gz" >> "$GITHUB_ENV"

      - name: Package build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          # 检查文件夹是否创建成功（文件夹模式）
          if (!(Test-Path "dist\DY Video Downloader")) {
            Write-Error "Error: DY Video Downloader folder not found in dist\"
            Get-ChildItem dist\
            exit 1
          }

          # 创建安装包（先创建安装包，再创建便携包）
          $installerName = "DY-Video-Downloader-${env:TAG_NAME}-windows-x64-installer"
          $nsisScript = "scripts/windows_installer.nsi"

          if (Test-Path $nsisScript) {
            # 更新 NSIS 脚本中的版本号
            $content = Get-Content $nsisScript -Raw
            $newVersion = '!define APP_VERSION "' + $env:TAG_NAME + '"'
            $content = $content -replace '!define APP_VERSION ".*"', $newVersion
            Set-Content $nsisScript $content

            # 使用完整路径调用 makensis
            $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
            if (Test-Path $makensis) {
              & $makensis $nsisScript

              # 重命名安装包
              $installerPath = "dist/DY_Video_Downloader_Setup_v${env:TAG_NAME}.exe"
              if (Test-Path $installerPath) {
                Move-Item $installerPath "${installerName}.exe" -Force
                Write-Host "Created installer: ${installerName}.exe"
              } else {
                Write-Warning "Installer exe not found at $installerPath, skipping installer..."
              }
            } else {
              Write-Warning "makensis.exe not found at $makensis, skipping installer..."
            }
          } else {
            Write-Warning "NSIS script not found at $nsisScript, skipping installer..."
          }

          # 创建便携包（压缩整个文件夹）
          $portableName = "DY-Video-Downloader-${env:TAG_NAME}-windows-x64-portable"
          Compress-Archive -Path "dist\DY Video Downloader" -DestinationPath "$portableName.zip" -Force
          Write-Host "Created portable: $portableName.zip"

          Get-ChildItem "$portableName.zip"
          if (Test-Path "${installerName}.exe") {
            Get-ChildItem "${installerName}.exe"
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            *.tar.gz
            *.zip
            *.exe
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
            prerelease="false"
            draft="false"
          fi

          if [ -z "$release_name" ]; then
            release_name="DY Video Downloader ${tag_name}"
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
