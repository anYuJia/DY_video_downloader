name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create release as draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  APP_NAME: douyin_downloader
  PYTHON_VERSION: "3.10"
  RELEASE_BODY: |
    ## 下载建议

    - Windows 安装版（推荐大多数用户）：下载 `DY-Video-Downloader-v*-windows-x64-installer.exe`
    - Windows 便携版（免安装）：下载 `DY-Video-Downloader-v*-windows-x64-portable.zip`，解压后运行里面的 exe
    - macOS Apple Silicon / M 系列：下载 `DY-Video-Downloader-v*-macos-arm64.dmg`
    - macOS Intel：下载 `DY-Video-Downloader-v*-macos-x64.dmg`
    - Linux Debian/Ubuntu：下载 `DY-Video-Downloader-v*-linux-x64.deb`
    - Linux Fedora/openSUSE/RHEL：下载 `DY-Video-Downloader-v*-linux-x64.rpm`
    - Linux 通用便携：下载 `DY-Video-Downloader-v*-linux-x64.tar.gz`

    `.sig` 和 `latest.json` / `windows.json` / `darwin.json` / `linux.json` 主要用于自动更新和签名校验，普通安装通常不需要手动下载。

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            label: linux-x64
            asset_suffix: linux-x64
            archive_ext: tar.gz
          - runner: windows-latest
            label: windows-x64
            asset_suffix: windows-x64
            archive_ext: zip
          - runner: macos-14
            label: macos-arm64
            asset_suffix: macos-arm64
            archive_ext: tar.gz
          - runner: macos-15-intel
            label: macos-x64
            asset_suffix: macos-x64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev rpm

      - name: Prepare CI requirements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          output = []
          for raw in Path("requirements.txt").read_text(encoding="utf-8").splitlines():
              line = raw.split("#", 1)[0].strip()
              if not line:
                  continue
              if line.startswith("asyncio") or line.startswith("dataclasses"):
                  continue
              output.append(line)

          Path("requirements-ci.txt").write_text("\n".join(output) + "\n", encoding="utf-8")
          print("Prepared requirements-ci.txt with", len(output), "entries")
          PY

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-ci.txt pyinstaller

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Clean runtime-only data
        shell: bash
        run: |
          rm -rf src/data .playwright-mcp

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          # 刷新环境变量
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          Write-Host "NSIS installed, makensis path:"
          Get-Command makensis -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source

      - name: Build app
        shell: bash
        env:
          APP_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: pyinstaller build.spec --clean --noconfirm

      - name: Prepare macOS distribution
        if: runner.os == 'macOS'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          arch="${{ matrix.asset_suffix == 'macos-arm64' && 'arm64' || 'x64' }}"
          APP_NAME="DY Video Downloader.app"

          # 检查 .app 是否创建成功
          if [ ! -d "dist/$APP_NAME" ]; then
            echo "Error: $APP_NAME not found in dist/"
            ls -la dist/
            exit 1
          fi

          ls -la dist/

          # 1. 便携版：使用 ditto 压缩 .app（比 zip -r 更适合 macOS app bundle）
          portable_name="DY-Video-Downloader-${TAG_NAME}-macos-${arch}-portable"
          rm -f "${portable_name}.zip"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "dist/$APP_NAME" "${portable_name}.zip"
          echo "Created portable: ${portable_name}.zip"
          ls -lh "${portable_name}.zip"

          # 2. DMG 安装包
          dmg_name="DY-Video-Downloader-${TAG_NAME}-macos-${arch}"
          dmg_temp="dmg_temp"
          rm -rf "$dmg_temp" "${dmg_name}.dmg"
          mkdir -p "$dmg_temp"
          cp -R "dist/$APP_NAME" "$dmg_temp/"
          ln -s /Applications "$dmg_temp/Applications"
          for attempt in 1 2 3 4 5; do
            if /usr/bin/hdiutil create -volname "DY Video Downloader" -srcfolder "$dmg_temp" -ov -format UDZO "${dmg_name}.dmg"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to create DMG after ${attempt} attempts" >&2
              exit 1
            fi
            echo "hdiutil create failed, retrying in ${attempt}s..."
            sleep "$attempt"
          done
          rm -rf "$dmg_temp"
          echo "Created DMG: ${dmg_name}.dmg"
          ls -lh "${dmg_name}.dmg"

      - name: Package build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          asset_name="DY-Video-Downloader-${TAG_NAME}-linux-x64"
          tar -C dist -czf "${asset_name}.tar.gz" "douyin_downloader"
          version="${TAG_NAME#v}"
          package_name="dy-video-downloader"

          package_root="$(mktemp -d)"
          mkdir -p "$package_root/DEBIAN" \
            "$package_root/opt/dy-video-downloader" \
            "$package_root/usr/bin" \
            "$package_root/usr/share/applications"
          cp -a dist/douyin_downloader/. "$package_root/opt/dy-video-downloader/"
          cat > "$package_root/usr/bin/douyin-downloader" <<'SH'
          #!/usr/bin/env sh
          exec /opt/dy-video-downloader/douyin_downloader "$@"
          SH
          chmod 755 "$package_root/usr/bin/douyin-downloader"
          cat > "$package_root/usr/share/applications/dy-video-downloader.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=DY Video Downloader
          Comment=Douyin video downloader
          Exec=/opt/dy-video-downloader/douyin_downloader
          Terminal=false
          Categories=Network;AudioVideo;
          DESKTOP
          installed_size="$(du -sk "$package_root" | cut -f1)"
          cat > "$package_root/DEBIAN/control" <<DEB
          Package: $package_name
          Version: $version
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: anYuJia
          Installed-Size: $installed_size
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0 | libwebkit2gtk-4.0-37
          Description: Douyin video downloader desktop application
          DEB
          dpkg-deb --root-owner-group --build "$package_root" "${asset_name}.deb"

          rpm_topdir="$PWD/rpmbuild"
          rpm_src="$(mktemp -d)"
          mkdir -p "$rpm_topdir"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p "$rpm_src/${package_name}-${version}"
          cp -a "$package_root/opt" "$package_root/usr" "$rpm_src/${package_name}-${version}/"
          tar -C "$rpm_src" -czf "$rpm_topdir/SOURCES/${package_name}-${version}.tar.gz" "${package_name}-${version}"
          cat > "$rpm_topdir/SPECS/${package_name}.spec" <<RPM
          Name: $package_name
          Version: $version
          Release: 1%{?dist}
          Summary: Douyin video downloader desktop application
          License: Proprietary
          BuildArch: x86_64
          Source0: %{name}-%{version}.tar.gz
          Requires: gtk3
          Requires: webkit2gtk4.1

          %description
          Douyin video downloader desktop application.

          %prep
          %setup -q

          %build

          %install
          mkdir -p %{buildroot}
          cp -a * %{buildroot}/

          %files
          /opt/dy-video-downloader
          /usr/bin/douyin-downloader
          /usr/share/applications/dy-video-downloader.desktop
          RPM
          rpmbuild --define "_topdir $rpm_topdir" -bb "$rpm_topdir/SPECS/${package_name}.spec"
          cp "$rpm_topdir/RPMS/x86_64/"*.rpm "${asset_name}.rpm"

          echo "ASSET_FILE=${asset_name}.tar.gz" >> "$GITHUB_ENV"

      - name: Package build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          # 检查文件夹是否创建成功（文件夹模式）
          if (!(Test-Path "dist\DY Video Downloader")) {
            Write-Error "Error: DY Video Downloader folder not found in dist\"
            Get-ChildItem dist\
            exit 1
          }

          # 便携版/安装包都要求 .config 与 exe 同级，否则 pythonnet + WinForms 可能无法正确初始化 CLR
          $runtimeConfigSource = "windows\DY Video Downloader.exe.config"
          $runtimeConfigTarget = "dist\DY Video Downloader\DY Video Downloader.exe.config"
          if (!(Test-Path $runtimeConfigSource)) {
            Write-Error "Runtime config not found: $runtimeConfigSource"
            exit 1
          }
          Copy-Item $runtimeConfigSource $runtimeConfigTarget -Force
          if (!(Test-Path $runtimeConfigTarget)) {
            Write-Error "Failed to copy runtime config to portable root: $runtimeConfigTarget"
            exit 1
          }
          Write-Host "Copied runtime config to: $runtimeConfigTarget"

          # 创建安装包（先创建安装包，再创建便携包）
          $installerName = "DY-Video-Downloader-${env:TAG_NAME}-windows-x64-installer"
          $nsisScript = "scripts/windows_installer.nsi"

          if (Test-Path $nsisScript) {
            # 更新 NSIS 脚本中的版本号
            $content = Get-Content $nsisScript -Raw
            $newVersion = '!define APP_VERSION "' + $env:TAG_NAME + '"'
            $content = $content -replace '!define APP_VERSION ".*"', $newVersion
            Set-Content $nsisScript $content

            # 使用完整路径调用 makensis
            $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
            if (Test-Path $makensis) {
              & $makensis $nsisScript

              # 重命名安装包
              $installerPath = "dist/DY_Video_Downloader_Setup_v${env:TAG_NAME}.exe"
              if (Test-Path $installerPath) {
                Move-Item $installerPath "${installerName}.exe" -Force
                Write-Host "Created installer: ${installerName}.exe"
              } else {
                Write-Warning "Installer exe not found at $installerPath, skipping installer..."
              }
            } else {
              Write-Warning "makensis.exe not found at $makensis, skipping installer..."
            }
          } else {
            Write-Warning "NSIS script not found at $nsisScript, skipping installer..."
          }

          # 创建便携包（压缩整个文件夹）
          $portableName = "DY-Video-Downloader-${env:TAG_NAME}-windows-x64-portable"
          Compress-Archive -Path "dist\DY Video Downloader" -DestinationPath "$portableName.zip" -Force
          Write-Host "Created portable: $portableName.zip"

          Get-ChildItem "$portableName.zip"
          if (Test-Path "${installerName}.exe") {
            Get-ChildItem "${installerName}.exe"
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            *.tar.gz
            *.zip
            *.exe
            *.dmg
            *.deb
            *.rpm
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Install Rust stable for updater signatures
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI for updater signatures
        run: cargo install tauri-cli --version "^2"

      - name: Sign release assets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required to publish signed updater assets" >&2
            exit 1
          fi

          while IFS= read -r -d '' asset; do
            echo "Signing ${asset}"
            cargo tauri signer sign "$asset"
          done < <(find release-assets -type f \
            ! -name '*.sig' \
            ! -name '*.json' \
            -print0 | sort -z)

          find release-assets -type f -name '*.sig' -print | sort

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
            draft="${{ inputs.draft }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
            prerelease="false"
            draft="false"
          fi

          if [ -z "$release_name" ]; then
            release_name="DY Video Downloader ${tag_name}"
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"

      - name: Generate updater metadata
        env:
          VERSION: ${{ steps.meta.outputs.tag_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release-assets
            node ../scripts/finalize-updater-metadata.mjs
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          body: ${{ env.RELEASE_BODY }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
